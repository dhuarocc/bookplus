server:
  port: 8086
  shutdown: graceful

spring:
  threads:
    virtual:
      enabled: true   # Java 21 — virtual threads (Project Loom)
  application:
    name: payment-service

  datasource:
    url:      ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5437/payment_db}
    username: ${PAYMENT_DB_USER:payment_user}
    password: ${PAYMENT_DB_PASS:payment_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ""

payment:
  jwt:
    public-key-base64: ${PAYMENT_JWT_PUBLIC_KEY_BASE64}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.bookplus.payment: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
