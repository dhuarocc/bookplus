name: CI

# Integración Continua: compila, ejecuta tests, mide cobertura (JaCoCo) y
# (opcional) analiza calidad con SonarQube en cada push y pull request.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  # ── Tests + cobertura de los servicios Java ────────────────────────────────
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - book-plus-api-gateway
          - book-plus-auth-service
          - book-plus-cart-service
          - book-plus-catalog-service
          - book-plus-inventory-service
          - book-plus-notification-service
          - book-plus-order-service
          - book-plus-payment-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests + JaCoCo
        working-directory: ${{ matrix.service }}
        run: mvn -B test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          if-no-files-found: ignore

  # ── Frontend: typecheck/build ─────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: book-plus-frontend
        run: npm ci || npm install
      - name: Build
        working-directory: book-plus-frontend
        run: npm run build

  # ── SonarQube (opcional: solo si están configurados los secretos) ──────────
  sonar:
    name: SonarQube ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    # Se ejecuta solo si defines los secretos SONAR_TOKEN y SONAR_HOST_URL.
    if: ${{ github.event_name == 'push' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - book-plus-api-gateway
          - book-plus-auth-service
          - book-plus-cart-service
          - book-plus-catalog-service
          - book-plus-inventory-service
          - book-plus-notification-service
          - book-plus-order-service
          - book-plus-payment-service
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # SonarCloud por defecto; para un SonarQube propio, define SONAR_HOST_URL.
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Sonar necesita el historial para el "new code"
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}
      - name: Analyze (SonarCloud / SonarQube)
        if: ${{ env.SONAR_TOKEN != '' }}
        working-directory: ${{ matrix.service }}
        run: |
          ORG_FLAG=""
          if [ -n "$SONAR_ORGANIZATION" ]; then ORG_FLAG="-Dsonar.organization=$SONAR_ORGANIZATION"; fi
          mvn -B clean test sonar:sonar \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN \
            $ORG_FLAG
      - name: Skip note
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "Sonar omitido — define el secreto SONAR_TOKEN (y SONAR_ORGANIZATION para SonarCloud) para activarlo."
