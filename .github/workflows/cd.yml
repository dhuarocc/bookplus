name: CD

# Entrega/Despliegue Continuo:
#   1) build-push: construye las 11 imágenes Docker y las publica en GHCR
#      (ghcr.io). No requiere secretos extra: usa el GITHUB_TOKEN del repo.
#   2) deploy: (opcional) se conecta por SSH a tu servidor y actualiza el stack
#      con docker-compose.deploy.yml. Se activa solo si defines los secretos SSH.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read
  packages: write   # necesario para publicar imágenes en GHCR
  id-token: write   # firma keyless de imágenes con Cosign (OIDC)

jobs:
  # ── 1) Construir y publicar imágenes en GHCR ───────────────────────────────
  build-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: bookplus-api-gateway,         context: book-plus-api-gateway }
          - { image: bookplus-auth-service,        context: book-plus-auth-service }
          - { image: bookplus-cart-service,        context: book-plus-cart-service }
          - { image: bookplus-catalog-service,     context: book-plus-catalog-service }
          - { image: bookplus-inventory-service,   context: book-plus-inventory-service }
          - { image: bookplus-notification-service,context: book-plus-notification-service }
          - { image: bookplus-order-service,       context: book-plus-order-service }
          - { image: bookplus-payment-service,     context: book-plus-payment-service }
          - { image: bookplus-report-service,      context: book-plus-report-service }
          - { image: bookplus-admin-bff,           context: book-plus-admin-bff }
          - { image: bookplus-frontend,            context: book-plus-frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # QEMU + Buildx permiten construir imágenes multi-arquitectura.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          # Multi-arquitectura: amd64 (AWS x86) y arm64 (Oracle Cloud Ampere).
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Firma de imágenes (Sigstore/Cosign, keyless con OIDC de GitHub) — anti-tampering.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}

  # ── 2) Desplegar por SSH (opcional) ────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: build-push
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
    steps:
      - name: Deploy over SSH
        if: ${{ env.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull --ff-only
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            export REGISTRY=ghcr.io/${{ secrets.GHCR_USER }}
            export TAG=latest
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d
            docker image prune -f
      - name: Skip note
        if: ${{ env.DEPLOY_HOST == '' }}
        run: echo "Deploy omitido — define los secretos DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY/DEPLOY_PATH/GHCR_USER/GHCR_TOKEN para activarlo."
