# Dependabot — actualizaciones automáticas de dependencias.
# Estrategia: solo minor/patch automáticos y agrupados. Se ignoran TODOS los saltos mayores
# (Maven y npm) y el minor de Spring Boot, porque rompen la compatibilidad del framework
# (Spring Cloud release train, Tailwind 4, Testcontainers 2, Angular major...). Esos se hacen
# a mano, de forma deliberada.
version: 2
updates:
  # ── Backend (Maven), uno por microservicio ────────────────────────────────
  - package-ecosystem: maven
    directory: "/book-plus-auth-service"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      maven-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Ningún salto MAYOR automático (se hacen a mano, coordinados con el framework).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Spring Boot: tampoco MINOR — p. ej. 3.3 -> 3.5 rompe la compatibilidad con el
      # release train de Spring Cloud 2023.0.x. Solo se aceptan parches dentro de 3.3.x.
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-minor"]

