server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

spring:
  threads:
    virtual:
      enabled: true   # Java 21 — virtual threads (Project Loom)
  application:
    name: catalog-service

  # ── Multipart (subida de PDF para vista previa) ────────────────────────────
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  datasource:
    url:      ${CATALOG_DB_URL:jdbc:postgresql://localhost:5434/catalog_db}
    username: ${CATALOG_DB_USER:catalog_user}
    password: ${CATALOG_DB_PASS:catalog_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  # ── JPA ───────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ─────────────────────────────────────────────────────────────────
  data:
    redis:
      host:     ${REDIS_HOST:localhost}
      port:     ${REDIS_PORT:6381}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

    # ── Elasticsearch ─────────────────────────────────────────────────────
    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USER:}
    password: ${ELASTICSEARCH_PASS:}
    connection-timeout: 5s
    socket-timeout: 30s

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all

  # ── Lifecycle ─────────────────────────────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 20s

# ── Security / JWT ────────────────────────────────────────────────────────────
# La validación JWT la hace un JwtDecoder propio en SecurityConfig usando la clave pública.
security:
  jwt:
    public-key-base64: ${CATALOG_JWT_PUBLIC_KEY_BASE64:}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    elasticsearch:
      enabled: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.bookplus.catalog: DEBUG
    org.springframework.data.elasticsearch: WARN
    org.hibernate.SQL: WARN

# ── SpringDoc / OpenAPI ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── Resilience4j ──────────────────────────────────────────────────────────────
# Protege la búsqueda en Elasticsearch: reintenta y, si el circuito se abre, usa el
# fallback (resultado vacío) para que el catálogo siga respondiendo aunque ES caiga.
resilience4j:
  circuitbreaker:
    instances:
      bookSearch:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      bookSearch:
        max-attempts: 3
        wait-duration: 200ms
