server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

spring:
  threads:
    virtual:
      enabled: true   # Java 21 — virtual threads (Project Loom)
  application:
    name: inventory-service

  datasource:
    url:      ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5435/inventory_db}
    username: ${INVENTORY_DB_USER:inventory_user}
    password: ${INVENTORY_DB_PASS:inventory_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Spring Batch: crea sus tablas de metadatos y NO ejecuta los jobs al arrancar
  # (el job de expiración lo dispara el scheduler, no el boot).
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  lifecycle:
    timeout-per-shutdown-phase: 20s

security:
  jwt:
    public-key-base64: ${INVENTORY_JWT_PUBLIC_KEY_BASE64:}

management:
  endpoints:
    web:
      exposure:
        include: health,i,prometheus
