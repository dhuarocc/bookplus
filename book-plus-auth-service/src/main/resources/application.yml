server:
  port: 8081
  error:
    include-message: never   # no exponer stacktrace en producción

spring:
  threads:
    virtual:
      enabled: true   # Java 21 — virtual threads (Project Loom)
  application:
    name: auth-service

  # ── Base de Datos ──────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:bookplus}
    password: ${DB_PASS:bookplus123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gestiona el schema, Hibernate solo valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  # ── Flyway ─────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Kafka ──────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

  # ── Redis ──────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # ── Mail (MailHog en local) ─────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:noreply@bookplus.local}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# ── JWT — Seguridad ────────────────────────────────────────────────────────
application:
  security:
    jwt:
      # En producción: pasar como variables de entorno (base64 del PEM completo)
      # APP_SECURITY_JWT_PRIVATE_KEY=<base64>
      # APP_SECURITY_JWT_PUBLIC_KEY=<base64>
      private-key: ${APP_SECURITY_JWT_PRIVATE_KEY:}
      public-key:  ${APP_SECURITY_JWT_PUBLIC_KEY:}
      access-token-expiration:  ${JWT_ACCESS_EXPIRATION:900000}      # 15 min
      refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 días

  frontend-url: ${FRONTEND_URL:http://localhost:4200}

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.bookplus.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

# ── SpringDoc / Swagger ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
